name: Crypto Signal Scan

on:
  schedule:
    - cron: '0 * * * *'   # 매 시간 실행
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Clean previous packages
        run: |
          pip uninstall -y numpy pandas ta ccxt requests || true

      - name: Install dependencies individually
        run: |
          python -m pip install numpy==1.25.2
          python -m pip install pandas==2.1.0
          python -m pip install ccxt==4.5.42
          python -m pip install ta==0.11.1
          python -m pip install requests

      - name: Run Crypto Signal Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python coin.py
