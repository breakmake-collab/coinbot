name: Crypto Signal Scan

on:
  schedule:
    # 0분, 10분, 20분에 실행 시도 (보험용)
    - cron: '0,10,20 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # 🎯 [추가] 깃허브 액션이 파일(last_run.txt)을 수정하고 저장소에 올릴 수 있는 권한을 줍니다.
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Crypto Signal Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python coin.py

      # 🎯 [핵심 추가] 파이썬이 생성한 last_run.txt를 깃허브 저장소에 업데이트합니다.
      # 이 과정이 있어야 10분/20분에 실행되는 봇이 0분에 돌았는지 알 수 있습니다.
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 파일이 없으면 에러가 날 수 있으므로 생성 여부 확인 후 추가
          if [ -f last_run.txt ]; then
            git add last_run.txt
            git commit -m "Update last run time [skip ci]" || echo "No changes to commit"
            git push
          fi
