name: Crypto Signal Scan

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Upgrade pip & clean previous packages
        run: |
          python -m pip install --upgrade pip
          pip uninstall -y numpy pandas ta ccxt requests || true

      - name: Install dependencies in proper order
        run: |
          python -m pip install numpy>=1.24.4
          python -m pip install pandas==2.1.0
          python -m pip install ccxt==4.5.42 ta requests

      - name: Run Crypto Signal Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python coin.py
